<html>

<body>


<h2>Online Examination</h2>


<p>

<input type="radio"
name="q"
value="correct">

<input type="radio"
name="q"
value="wrong">

<button onclick="submitExam()">
Submit
</button>


<h3 id="result"></h3>



<script>


function submitExam(){

if(!answer){

alert("Select answer");
return;

}


if(answer.value=="correct")

result.innerHTML=
"Score: 10/10";


else

result.innerHTML=
"Score: 0/10";


}


</script>
