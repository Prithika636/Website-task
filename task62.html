<!DOCTYPE html>
<html>

<body>


<h2>ERP System</h2>


<button onclick="showInventory()">
Inventory
</button>


<button onclick="showEmployee()">
Employees
</button>


<div id="result"></div>


<script>


function showInventory(){

document.getElementById("result")
.innerHTML=
"Products: 500<br>Stock Available";


}


function showEmployee(){

document.getElementById("result")
.innerHTML=
"Employees: 100";


}


</script>


</body>
</html>
