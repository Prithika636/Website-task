<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Authentication System</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f6f9;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:380px;
    background:#fff;
    padding:25px;
    border-radius:12px;
    box-shadow:0 5px 20px rgba(0,0,0,.15);
}

h2{
    text-align:center;
    margin-bottom:20px;
    color:#333;
}

input{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:1px solid #ccc;
    border-radius:6px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:6px;
    background:#007bff;
    color:white;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    background:#0056b3;
}

.link{
    text-align:center;
    margin-top:15px;
}

.link a{
    color:#007bff;
    text-decoration:none;
    cursor:pointer;
}

.message{
    margin-top:10px;
    text-align:center;
    font-size:14px;
}

.success{
    color:green;
}

.error{
    color:red;
}

.dashboard{
    display:none;
    text-align:center;
}

.logout-btn{
    background:#dc3545;
}

.logout-btn:hover{
    background:#b52b3a;
}
</style>
</head>
<body>

<div class="container">

    <!-- Register -->
    <div id="registerPage">
        <h2>Create Account</h2>

        <input type="text" id="regName" placeholder="Username">
        <input type="email" id="regEmail" placeholder="Email">
        <input type="password" id="regPassword" placeholder="Password">

        <button onclick="register()">Register</button>

        <div id="regMsg" class="message"></div>

        <div class="link">
            Already have an account?
            <a onclick="showLogin()">Login</a>
        </div>
    </div>

    <!-- Login -->
    <div id="loginPage" style="display:none;">
        <h2>Login</h2>

        <input type="email" id="loginEmail" placeholder="Email">
        <input type="password" id="loginPassword" placeholder="Password">

        <button onclick="login()">Login</button>

        <div id="loginMsg" class="message"></div>

        <div class="link">
            Don't have an account?
            <a onclick="showRegister()">Register</a>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboard" class="dashboard">
        <h2>Dashboard</h2>

        <p>Welcome, <strong id="userName"></strong></p>
        <p id="userEmail"></p>

        <br>

        <button class="logout-btn" onclick="logout()">
            Logout
        </button>
    </div>

</div>

<script>
const registerPage = document.getElementById("registerPage");
const loginPage = document.getElementById("loginPage");
const dashboard = document.getElementById("dashboard");

function showLogin(){
    registerPage.style.display = "none";
    loginPage.style.display = "block";
}

function showRegister(){
    loginPage.style.display = "none";
    registerPage.style.display = "block";
}

function register(){

    const name =
        document.getElementById("regName").value.trim();

    const email =
        document.getElementById("regEmail").value.trim();

    const password =
        document.getElementById("regPassword").value;

    const msg =
        document.getElementById("regMsg");

    if(!name || !email || !password){
        msg.className = "message error";
        msg.textContent = "All fields are required.";
        return;
    }

    let users =
        JSON.parse(localStorage.getItem("users")) || [];

    if(users.find(u => u.email === email)){
        msg.className = "message error";
        msg.textContent = "Email already exists.";
        return;
    }

    users.push({
        name,
        email,
        password
    });

    localStorage.setItem(
        "users",
        JSON.stringify(users)
    );

    msg.className = "message success";
    msg.textContent =
        "Registration successful! Please login.";

    setTimeout(showLogin,1000);
}

function login(){

    const email =
        document.getElementById("loginEmail").value.trim();

    const password =
        document.getElementById("loginPassword").value;

    const msg =
        document.getElementById("loginMsg");

    let users =
        JSON.parse(localStorage.getItem("users")) || [];

    const user =
        users.find(
            u => u.email === email &&
                 u.password === password
        );

    if(!user){
        msg.className = "message error";
        msg.textContent = "Invalid credentials.";
        return;
    }

    localStorage.setItem(
        "currentUser",
        JSON.stringify(user)
    );

    loadDashboard();
}

function loadDashboard(){

    const user =
        JSON.parse(
            localStorage.getItem("currentUser")
        );

    if(!user){
        dashboard.style.display = "none";
        loginPage.style.display = "block";
        return;
    }

    registerPage.style.display = "none";
    loginPage.style.display = "none";
    dashboard.style.display = "block";

    document.getElementById("userName")
        .textContent = user.name;

    document.getElementById("userEmail")
        .textContent = user.email;
}

function logout(){

    localStorage.removeItem("currentUser");

    dashboard.style.display = "none";
    loginPage.style.display = "block";
}

loadDashboard();
</script>

</body>
</html>
