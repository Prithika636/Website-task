<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Checkout Page</title>


<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}


body{

    background:#f1f5f9;
    padding:30px;

}


.container{

    max-width:1100px;
    margin:auto;

}


h1{

    text-align:center;
    margin-bottom:30px;
    color:#1e293b;

}


/* Layout */

.checkout{

    display:grid;
    grid-template-columns:2fr 1fr;
    gap:25px;

}



/* Form */

.box{

    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);

}


.box h2{

    margin-bottom:20px;
    color:#2563eb;

}


.form-group{

    margin-bottom:15px;

}


label{

    display:block;
    margin-bottom:7px;
    font-weight:bold;

}


input,select,textarea{

    width:100%;
    padding:12px;
    border:1px solid #cbd5e1;
    border-radius:8px;

}


textarea{

    height:100px;
    resize:none;

}




/* Order Summary */

.order-item{

    display:flex;
    justify-content:space-between;
    margin:15px 0;
    color:#475569;

}


.total{

    border-top:1px solid #ddd;
    padding-top:15px;
    font-size:22px;
    font-weight:bold;

}



.payment label{

    display:block;
    margin:15px 0;

}




.checkout-btn{

    width:100%;
    padding:14px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
    margin-top:20px;

}


.checkout-btn:hover{

    background:#1d4ed8;

}



/* Responsive */

@media(max-width:800px){

.checkout{

    grid-template-columns:1fr;

}

}

</style>


</head>


<body>


<div class="container">


<h1>Checkout</h1>



<div class="checkout">



<!-- Customer Details -->


<div class="box">


<h2>Billing Details</h2>


<div class="form-group">

<label>Full Name</label>

<input type="text" placeholder="Enter your name">

</div>



<div class="form-group">

<label>Email</label>

<input type="email" placeholder="Enter email">

</div>



<div class="form-group">

<label>Phone Number</label>

<input type="tel" placeholder="Phone number">

</div>




<div class="form-group">

<label>Address</label>

<textarea placeholder="Enter address"></textarea>

</div>




<div class="form-group">

<label>City</label>

<input type="text" placeholder="City">

</div>



<div class="form-group">

<label>Country</label>

<select>

<option>India</option>
<option>USA</option>
<option>UK</option>

</select>

</div>




<h2>Payment Method</h2>


<div class="payment">

<label>
<input type="radio" name="payment">
 Credit Card
</label>


<label>
<input type="radio" name="payment">
 UPI
</label>


<label>
<input type="radio" name="payment">
 Cash On Delivery
</label>


</div>



</div>







<!-- Order Summary -->


<div class="box">


<h2>Order Summary</h2>



<div class="order-item">

<span>Laptop</span>

<span>$800</span>

</div>



<div class="order-item">

<span>Headphones</span>

<span>$100</span>

</div>



<div class="order-item">

<span>Delivery</span>

<span>$20</span>

</div>




<div class="total">

Total: $920

</div>



<button class="checkout-btn">

Place Order

</button>



</div>



</div>


</div>


</body>

</html>
