<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Responsive Form</title>


<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}


body{

    min-height:100vh;
    background:linear-gradient(135deg,#2563eb,#7c3aed);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;

}



.form-container{

    background:white;
    width:100%;
    max-width:600px;
    padding:35px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);

}



.form-container h2{

    text-align:center;
    margin-bottom:25px;
    color:#1e293b;

}



.form-group{

    margin-bottom:20px;

}



.form-group label{

    display:block;
    margin-bottom:8px;
    font-weight:bold;
    color:#475569;

}



.form-group input,
.form-group textarea,
.form-group select{

    width:100%;
    padding:12px;
    border:1px solid #cbd5e1;
    border-radius:8px;
    font-size:16px;

}



.form-group textarea{

    resize:none;
    height:100px;

}



.gender{

    display:flex;
    gap:20px;

}



.options{

    display:flex;
    gap:10px;
    align-items:center;

}



.submit-btn{

    width:100%;
    padding:14px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;

}



.submit-btn:hover{

    background:#1d4ed8;

}



/* Responsive */

@media(max-width:600px){

.form-container{

    padding:25px;

}


.gender{

    flex-direction:column;

}

}


</style>


</head>


<body>



<div class="form-container">


<h2>Registration Form</h2>


<form>



<div class="form-group">

<label>Full Name</label>

<input type="text" placeholder="Enter your name" required>

</div>




<div class="form-group">

<label>Email Address</label>

<input type="email" placeholder="Enter your email" required>

</div>




<div class="form-group">

<label>Phone Number</label>

<input type="tel" placeholder="Enter phone number">

</div>




<div class="form-group">

<label>Password</label>

<input type="password" placeholder="Create password">

</div>




<div class="form-group">

<label>Country</label>

<select>

<option>Select Country</option>

<option>India</option>

<option>USA</option>

<option>UK</option>

<option>Canada</option>

</select>

</div>




<div class="form-group">

<label>Gender</label>

<div class="gender">

<label>
<input type="radio" name="gender">
Male
</label>


<label>
<input type="radio" name="gender">
Female
</label>


<label>
<input type="radio" name="gender">
Other
</label>

</div>

</div>




<div class="form-group">

<label>Message</label>

<textarea placeholder="Enter your message"></textarea>

</div>




<div class="form-group options">

<input type="checkbox">

<p>
I agree to the terms and conditions
</p>

</div>




<button class="submit-btn">
Submit Form
</button>



</form>


</div>



</body>

</html>
