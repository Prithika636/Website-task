

<!DOCTYPE html>
<html>

<head>

<title>MongoDB User System</title>

<style>

body{
    font-family:Arial;
    background:#eeeeee;
    padding:30px;
}

.box{

    width:400px;
    background:white;
    margin:auto;
    padding:20px;
    border-radius:10px;
}

input{

    width:100%;
    padding:10px;
    margin:8px 0;

}

button{

    padding:10px;
    background:#007bff;
    color:white;
    border:0;
    cursor:pointer;

}

.delete{

    background:red;

}

li{

    background:#ddd;
    margin:10px;
    padding:10px;

}

</style>

</head>


<body>


<div class="box">

<h2>MongoDB User Management</h2>


<input id="name" placeholder="Enter Name">


<input id="email" placeholder="Enter Email">


<button onclick="saveUser()">
Save User
</button>


<ul id="result"></ul>


</div>



<script>


async function saveUser(){

let name =
document.getElementById("name").value;


let email =
document.getElementById("email").value;



await fetch("/users",
{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
name,
email
})

});


loadUsers();

}



async function loadUsers(){

let res =
await fetch("/users");


let data =
await res.json();



let output =
document.getElementById("result");


output.innerHTML="";



data.forEach(user=>{


output.innerHTML +=

`

<li>

<b>${user.name}</b>

<br>

${user.email}

<br>

<button class="delete"
onclick="deleteUser('${user._id}')">

Delete

</button>


</li>

`;


});


}



async function deleteUser(id){


await fetch("/users/"+id,
{

method:"DELETE"

});


loadUsers();


}



loadUsers();


</script>


</body>

</html>
