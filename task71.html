<!DOCTYPE html>
<html>
<head>
<title>Inventory Management</title>

<style>
body{
font-family:Arial;
padding:30px;
}

table{
border-collapse:collapse;
width:500px;
}

th,td{
border:1px solid black;
padding:10px;
}

button{
background:green;
color:white;
padding:8px;
}
</style>

</head>

<body>

<h2>Inventory Management System</h2>


<input id="product" placeholder="Product Name">

<input id="qty" placeholder="Quantity">


<button onclick="addProduct()">
Add Product
</button>


<table>

<tr>
<th>Product</th>
<th>Quantity</th>
</tr>

<tbody id="inventory">

</tbody>

</table>



<script>


function addProduct(){


let product =
document.getElementById("product").value;


let qty =
document.getElementById("qty").value;


document.getElementById("inventory")
.innerHTML +=

`
<tr>
<td>${product}</td>
<td>${qty}</td>
</tr>
`;

}


</script>


</body>
</html>
