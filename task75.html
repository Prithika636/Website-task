<!DOCTYPE html>

<html>

<head>

<title>Google Map Integration</title>


<style>

#map{

height:400px;

width:100%;

}

</style>


</head>


<body>


<h2>Google Map Location</h2>


<div id="map"></div>



<script>


function initMap(){


let location={

lat:11.3410,

lng:77.7172

};



let map =
new google.maps.Map(

document.getElementById("map"),

{

zoom:12,

center:location

}

);



let marker =
new google.maps.Marker({

position:location,

map:map,

title:"My Location"

});


}



</script>



<script async defer

src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&callback=initMap">

</script>


</body>

</html>
