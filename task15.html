<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Image Slider</title>


<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}


body{

    background:#f1f5f9;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;

}



/* Slider */

.slider-container{

    width:90%;
    max-width:900px;
    height:500px;
    position:relative;
    overflow:hidden;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);

}


.slides{

    display:flex;
    width:300%;
    height:100%;
    transition:0.5s;

}


.slide{

    width:100%;
    flex-shrink:0;

}


.slide img{

    width:100%;
    height:100%;
    object-fit:cover;

}



/* Buttons */

.btn{

    position:absolute;
    top:50%;
    transform:translateY(-50%);
    background:rgba(0,0,0,0.5);
    color:white;
    border:none;
    padding:15px;
    font-size:25px;
    cursor:pointer;
    border-radius:50%;

}


.prev{

    left:20px;

}


.next{

    right:20px;

}


/* Dots */

.dots{

    position:absolute;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:10px;

}


.dot{

    width:12px;
    height:12px;
    background:white;
    border-radius:50%;
    cursor:pointer;

}


.active{

    background:#2563eb;

}



/* Mobile */

@media(max-width:600px){

.slider-container{

    height:300px;

}

}


</style>


</head>


<body>



<div class="slider-container">


<div class="slides" id="slides">


<div class="slide">
<img src="https://picsum.photos/id/1015/900/500">
</div>


<div class="slide">
<img src="https://picsum.photos/id/1016/900/500">
</div>


<div class="slide">
<img src="https://picsum.photos/id/1018/900/500">
</div>


</div>



<button class="btn prev" onclick="previousSlide()">
❮
</button>


<button class="btn next" onclick="nextSlide()">
❯
</button>



<div class="dots">

<span class="dot active" onclick="goSlide(0)"></span>

<span class="dot" onclick="goSlide(1)"></span>

<span class="dot" onclick="goSlide(2)"></span>

</div>



</div>





<script>


let currentSlide=0;


let slides=document.getElementById("slides");

let dots=document.querySelectorAll(".dot");



function showSlide(index){


    if(index>2){

        currentSlide=0;

    }


    if(index<0){

        currentSlide=2;

    }


    slides.style.transform=
    "translateX(-"+currentSlide*33.33+"%)";



    dots.forEach(dot=>{

        dot.classList.remove("active");

    });


    dots[currentSlide].classList.add("active");


}




function nextSlide(){

    currentSlide++;

    showSlide(currentSlide);

}



function previousSlide(){

    currentSlide--;

    showSlide(currentSlide);

}




function goSlide(index){

    currentSlide=index;

    showSlide(currentSlide);

}




// Auto Slide

setInterval(()=>{

    nextSlide();

},3000);



</script>


</body>

</html>
