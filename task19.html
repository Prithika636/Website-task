<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact Form</title>


<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}


body{

    min-height:100vh;
    background:linear-gradient(135deg,#2563eb,#7c3aed);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;

}



/* Contact Box */

.contact-container{

    width:100%;
    max-width:700px;
    background:white;
    padding:40px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);

}



.contact-container h1{

    text-align:center;
    color:#1e293b;
    margin-bottom:10px;

}


.contact-container p{

    text-align:center;
    color:#64748b;
    margin-bottom:30px;

}



/* Form */

.form-group{

    margin-bottom:20px;

}



.form-group label{

    display:block;
    margin-bottom:8px;
    color:#475569;
    font-weight:bold;

}



.form-group input,
.form-group select,
.form-group textarea{

    width:100%;
    padding:12px;
    border:1px solid #cbd5e1;
    border-radius:8px;
    font-size:16px;

}



.form-group textarea{

    height:120px;
    resize:none;

}



.form-group input:focus,
.form-group textarea:focus,
.form-group select:focus{

    outline:none;
    border-color:#2563eb;

}



/* Button */

.submit-btn{

    width:100%;
    padding:14px;
    border:none;
    background:#2563eb;
    color:white;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;

}


.submit-btn:hover{

    background:#1d4ed8;

}



/* Responsive */

@media(max-width:600px){

.contact-container{

    padding:25px;

}

}

</style>


</head>



<body>



<div class="contact-container">


<h1>Contact Us</h1>

<p>
Have a question? Send us a message.
</p>



<form>


<div class="form-group">

<label>Full Name</label>

<input type="text" placeholder="Enter your name" required>

</div>




<div class="form-group">

<label>Email Address</label>

<input type="email" placeholder="Enter your email" required>

</div>




<div class="form-group">

<label>Phone Number</label>

<input type="tel" placeholder="Enter your phone number">

</div>




<div class="form-group">

<label>Subject</label>

<select>

<option>Select Subject</option>

<option>General Inquiry</option>

<option>Support</option>

<option>Business Proposal</option>

<option>Feedback</option>

</select>

</div>




<div class="form-group">

<label>Your Message</label>

<textarea placeholder="Write your message here"></textarea>

</div>




<button class="submit-btn">

Send Message

</button>



</form>


</div>



</body>

</html>
