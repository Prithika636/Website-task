<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Navbar</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f5f7fa;
}

/* Navbar */
.navbar{
    background:#0f172a;
    padding:15px 8%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    position:sticky;
    top:0;
    z-index:1000;
}

.logo{
    color:#fff;
    font-size:28px;
    font-weight:bold;
    text-decoration:none;
}

.nav-links{
    list-style:none;
    display:flex;
    gap:30px;
}

.nav-links a{
    text-decoration:none;
    color:#fff;
    font-size:16px;
    font-weight:500;
    padding:8px 12px;
    border-radius:6px;
    transition:0.3s;
}

.nav-links a:hover{
    background:#38bdf8;
    color:#fff;
}

/* CTA Button */
.btn{
    background:#38bdf8;
    color:#fff;
    text-decoration:none;
    padding:10px 20px;
    border-radius:30px;
    transition:0.3s;
}

.btn:hover{
    background:#0ea5e9;
}

/* Mobile */
@media(max-width:768px){
    .navbar{
        flex-direction:column;
        gap:15px;
    }

    .nav-links{
        flex-wrap:wrap;
        justify-content:center;
        gap:15px;
    }
}
</style>
</head>
<body>

<nav class="navbar">
    <a href="#" class="logo">TechNova</a>

    <ul class="nav-links">
        <li><a href="#">Home</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Services</a></li>
        <li><a href="#">Portfolio</a></li>
        <li><a href="#">Contact</a></li>
    </ul>

    <a href="#" class="btn">Get Started</a>
</nav>

</body>
</html>
