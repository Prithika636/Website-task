

<!DOCTYPE html>
<html>

<head>

<title>API Documentation</title>

<style>

body{

font-family:Arial;
background:#f2f2f2;
padding:30px;

}


.container{

width:800px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;

}


.card{

background:#eeeeee;
padding:15px;
margin:15px 0;
border-radius:8px;

}


.method{

color:white;
padding:5px;
border-radius:5px;

}


.GET{
background:green;
}


.POST{
background:blue;
}


.PUT{
background:orange;
}


.DELETE{
background:red;
}


pre{

background:#222;
color:#00ff00;
padding:10px;

}


</style>

</head>


<body>


<div class="container">


<h1>REST API Documentation</h1>


<div id="docs"></div>


</div>



<script>


fetch("/api/docs")

.then(res=>res.json())

.then(data=>{


let output="";


data.forEach(api=>{


output +=

`

<div class="card">

<h3>

<span class="method ${api.method}">

${api.method}

</span>

${api.url}

</h3>


<p>
${api.description}
</p>


<h4>Request</h4>

<pre>

${JSON.stringify(api.request,null,2)}

</pre>


<h4>Response</h4>

<pre>

${JSON.stringify(api.response,null,2)}

</pre>


</div>

`;

});


document.getElementById("docs")
.innerHTML=output;


});


</script>


</body>

</html>
