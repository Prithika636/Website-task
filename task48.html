<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notification System</title>

<style>
    body {
        font-family: Arial, sans-serif;
        padding: 30px;
        background: #f4f4f4;
    }

    button {
        padding: 12px 20px;
        background: #007bff;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        margin-right: 10px;
    }

    .notification-container {
        position: fixed;
        top: 20px;
        right: 20px;
        z-index: 1000;
    }

    .notification {
        min-width: 280px;
        padding: 15px;
        margin-bottom: 10px;
        border-radius: 5px;
        color: white;
        animation: slideIn 0.4s ease;
    }

    .success {
        background-color: #28a745;
    }

    .error {
        background-color: #dc3545;
    }

    .warning {
        background-color: #ffc107;
        color: black;
    }

    .info {
        background-color: #17a2b8;
    }

    @keyframes slideIn {
        from {
            transform: translateX(100%);
            opacity: 0;
        }
        to {
            transform: translateX(0);
            opacity: 1;
        }
    }
</style>
</head>
<body>

<h2>Notification System Demo</h2>

<button onclick="showNotification('Data saved successfully!','success')">
    Success
</button>

<button onclick="showNotification('Something went wrong!','error')">
    Error
</button>

<button onclick="showNotification('Please check your input.','warning')">
    Warning
</button>

<button onclick="showNotification('New update available.','info')">
    Info
</button>

<div id="notificationContainer" class="notification-container"></div>

<script>
function showNotification(message, type) {

    const container =
        document.getElementById("notificationContainer");

    const notification =
        document.createElement("div");

    notification.className =
        `notification ${type}`;

    notification.innerText = message;

    container.appendChild(notification);

    // Auto remove after 3 seconds
    setTimeout(() => {
        notification.remove();
    }, 3000);
}
</script>

</body>
</html>
